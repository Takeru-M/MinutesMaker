services:
  # --- Next.js (フロントエンド) ---
  frontend:
    build:
      context: .
      dockerfile: Docker/frontend/Dockerfile
      target: dev
    container_name: minutes_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_WEBPACK_USEPOLLING: "1"
    networks:
      - app-network
    ports:
      - "3000:3000"
    command: npm run dev:docker

# --- FastAPI (バックエンド) ---
  backend:
    build:
      context: .
      dockerfile: Docker/backend/Dockerfile
    container_name: minutes_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - app-network
    ports:
      - "8000:8000"
    command: sh -c "pip install --no-cache-dir -r /app/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    # environment:
    #   DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}
    #   APP_ENV: development

  db:
    image: mysql:8.0
    restart: always
    container_name: mysql_db
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Test Database ---
  db_test:
    image: mysql:8.0
    restart: no
    container_name: mysql_db_test
    env_file:
      - ./.env.test
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  db_test_data:

networks:
  app-network:
    driver: bridge